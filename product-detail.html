<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="View product details, dosage information, and add to cart at SHOBHA MEDICAL STORES.">
  <title>Product Details — SHOBHA MEDICAL STORES</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
  <link href="style.css" rel="stylesheet">
</head>
<body>
  <div class="page-loader" id="pageLoader"><div class="loader-spinner"></div></div>
  <div id="navbar-container"></div>

  <section style="padding-top:100px;padding-bottom:1rem;background:white;border-bottom:var(--border-light);">
    <div class="container">
      <nav aria-label="breadcrumb">
        <ol class="breadcrumb mb-0" style="font-size:var(--fs-sm);">
          <li class="breadcrumb-item"><a href="index.html">Home</a></li>
          <li class="breadcrumb-item"><a href="products.html">Products</a></li>
          <li class="breadcrumb-item active" id="breadcrumbProduct">Product Details</li>
        </ol>
      </nav>
    </div>
  </section>

  <section class="section-padding" style="padding-top:2rem;">
    <div class="container">
      <div id="productDetail">
        <!-- Loaded dynamically -->
      </div>

      <!-- Related Products -->
      <div class="mt-5">
        <div class="section-header" style="text-align:left;">
          <span class="badge-label">Related Products</span>
          <h3>You May Also Like</h3>
        </div>
        <div class="row" id="relatedProducts"></div>
      </div>
    </div>
  </section>

  <div id="footer-container"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/seed-data.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/app.js"></script>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      App.init();
      document.getElementById('navbar-container').innerHTML = App.getNavbarHTML('products');
      document.getElementById('footer-container').innerHTML = App.getFooterHTML();

      const productId = Utils.getUrlParam('id');
      if (!productId) {
        window.location.href = 'products.html';
        return;
      }

      const product = App.getById('products', productId);
      if (!product) {
        document.getElementById('productDetail').innerHTML = `
          <div class="empty-state">
            <i class="fas fa-exclamation-triangle"></i>
            <h4>Product Not Found</h4>
            <p>This product may have been removed or the link is invalid.</p>
            <a href="products.html" class="btn-primary-custom">Browse Products</a>
          </div>`;
        return;
      }

      renderProductDetail(product);
      loadRelatedProducts(product);
    });

    function renderProductDetail(product) {
      const stock = Utils.getStockStatus(product.stock_qty, App.getSettings().low_stock_threshold || 10);
      const icon = Utils.getCategoryIcon(product.category);
      const isOutOfStock = product.stock_qty <= 0;

      document.getElementById('breadcrumbProduct').textContent = product.name;
      document.title = `${product.name} — SHOBHA MEDICAL STORES`;

      document.getElementById('productDetail').innerHTML = `
        <div class="row g-4">
          <div class="col-lg-5">
            <div class="glass-card text-center" style="padding:3rem;">
              <i class="fas ${icon}" style="font-size:10rem;color:var(--primary-300);opacity:0.6;"></i>
              <div class="mt-3">
                <span class="status-badge ${stock.class}">
                  <i class="fas ${stock.icon} me-1"></i>${stock.label}
                </span>
              </div>
            </div>
          </div>
          <div class="col-lg-7">
            <div>
              <span class="product-category" style="font-size:var(--fs-sm);">${Utils.sanitize(product.category)}</span>
              <h1 style="font-size:var(--fs-3xl);margin:0.5rem 0;">${Utils.sanitize(product.name)}</h1>
              
              <div class="d-flex align-items-center gap-3 mb-3">
                <span class="product-price" style="font-size:var(--fs-4xl);">${Utils.formatCurrency(product.price)}</span>
                <span class="status-badge ${stock.class}">${stock.label}</span>
              </div>

              <p class="text-muted mb-4" style="font-size:var(--fs-lg);line-height:1.8;">${Utils.sanitize(product.description)}</p>

              <!-- Product Details Table -->
              <div class="table-container mb-4">
                <table class="table mb-0">
                  <tbody>
                    ${product.dosage ? `<tr><td class="fw-bold" style="width:40%">Dosage / Strength</td><td>${Utils.sanitize(product.dosage)}</td></tr>` : ''}
                    ${product.strength ? `<tr><td class="fw-bold">Form / Pack</td><td>${Utils.sanitize(product.strength)}</td></tr>` : ''}
                    <tr><td class="fw-bold">Category</td><td>${Utils.sanitize(product.category)}</td></tr>
                    <tr><td class="fw-bold">Stock Available</td><td>${product.stock_qty} units</td></tr>
                    ${product.expiry_date ? `<tr><td class="fw-bold">Expiry Date</td><td>${Utils.formatDate(product.expiry_date)}</td></tr>` : ''}
                  </tbody>
                </table>
              </div>

              <!-- Add to Cart -->
              <div class="d-flex align-items-center gap-3 flex-wrap">
                <div class="quantity-control">
                  <button onclick="changeQty(-1)" id="qtyMinus"><i class="fas fa-minus"></i></button>
                  <input type="number" class="qty-value" id="qtyInput" value="1" min="1" max="${product.stock_qty}" readonly>
                  <button onclick="changeQty(1)" id="qtyPlus"><i class="fas fa-plus"></i></button>
                </div>
                <button class="btn-primary-custom btn-lg-custom" id="addToCartBtn"
                        onclick="addProductToCart('${product.id}')" ${isOutOfStock ? 'disabled' : ''}>
                  <i class="fas fa-cart-plus"></i> ${isOutOfStock ? 'Out of Stock' : 'Add to Cart'}
                </button>
                <button class="btn-outline-custom btn-lg-custom" onclick="buyNow('${product.id}')" ${isOutOfStock ? 'disabled' : ''}>
                  <i class="fas fa-bolt"></i> Buy Now
                </button>
              </div>

              <!-- Trust Badges -->
              <div class="d-flex gap-4 mt-4 flex-wrap">
                <div class="d-flex align-items-center gap-2 text-muted" style="font-size:var(--fs-sm);">
                  <i class="fas fa-certificate text-success"></i> 100% Genuine
                </div>
                <div class="d-flex align-items-center gap-2 text-muted" style="font-size:var(--fs-sm);">
                  <i class="fas fa-truck text-primary"></i> Fast Delivery
                </div>
                <div class="d-flex align-items-center gap-2 text-muted" style="font-size:var(--fs-sm);">
                  <i class="fas fa-shield-alt text-warning"></i> Secure Payment
                </div>
              </div>
            </div>
          </div>
        </div>
      `;
    }

    function changeQty(delta) {
      const input = document.getElementById('qtyInput');
      const newVal = parseInt(input.value) + delta;
      const max = parseInt(input.max);
      if (newVal >= 1 && newVal <= max) {
        input.value = newVal;
      }
    }

    function addProductToCart(productId) {
      const qty = parseInt(document.getElementById('qtyInput').value);
      App.addToCart(productId, qty);
    }

    function buyNow(productId) {
      const qty = parseInt(document.getElementById('qtyInput').value);
      App.addToCart(productId, qty);
      window.location.href = 'cart.html';
    }

    function loadRelatedProducts(product) {
      let related = App.getProducts({ customerView: true, category: product.category });
      related = related.filter(p => p.id !== product.id).slice(0, 4);

      const grid = document.getElementById('relatedProducts');
      if (related.length === 0) {
        grid.innerHTML = '<p class="text-muted">No related products found.</p>';
        return;
      }
      grid.innerHTML = related.map(p => App.renderProductCard(p)).join('');
    }
  </script>
</body>
</html>
