<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Order Management — SHOBHA MEDICAL STORES Admin</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
  <link href="../style.css" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body>

  <aside class="admin-sidebar" id="adminSidebar">
    <div class="sidebar-brand">
      <h4><i class="fas fa-clinic-medical me-2" style="color:var(--primary-400);"></i>SHOBHA</h4>
      <span>Medical Stores — Admin</span>
    </div>
    <ul class="sidebar-nav">
      <li class="nav-item"><a class="nav-link" href="dashboard.html"><i class="fas fa-tachometer-alt"></i> Dashboard</a></li>
      <li class="nav-item"><a class="nav-link" href="products.html"><i class="fas fa-pills"></i> Products</a></li>
      <li class="nav-item"><a class="nav-link" href="approvals.html"><i class="fas fa-clipboard-check"></i> Approvals <span class="badge bg-warning ms-1" id="sidebarPendingCount">0</span></a></li>
      <li class="nav-item"><a class="nav-link active" href="orders.html"><i class="fas fa-clipboard-list"></i> Orders</a></li>
      <li class="nav-item"><a class="nav-link" href="settings.html"><i class="fas fa-cog"></i> Settings</a></li>
      <li class="nav-item" style="margin-top:2rem;"><a class="nav-link" href="../index.html"><i class="fas fa-store"></i> View Store</a></li>
      <li class="nav-item"><a class="nav-link text-danger" href="#" onclick="Auth.logout()"><i class="fas fa-sign-out-alt"></i> Logout</a></li>
    </ul>
  </aside>

  <main class="admin-main">
    <div class="admin-topbar">
      <div>
        <button class="btn btn-sm d-lg-none me-2" onclick="document.getElementById('adminSidebar').classList.toggle('show')">
          <i class="fas fa-bars"></i>
        </button>
        <h2>Order Management</h2>
      </div>
    </div>

    <!-- Order Status Quick Filters -->
    <div class="filter-pills mb-4" id="statusFilters">
      <button class="filter-pill active" onclick="filterOrders('all', this)">All</button>
      <button class="filter-pill" onclick="filterOrders('pending', this)">🕐 Pending</button>
      <button class="filter-pill" onclick="filterOrders('confirmed', this)">✅ Confirmed</button>
      <button class="filter-pill" onclick="filterOrders('packed', this)">📦 Packed</button>
      <button class="filter-pill" onclick="filterOrders('dispatched', this)">🚚 Dispatched</button>
      <button class="filter-pill" onclick="filterOrders('delivered', this)">✅ Delivered</button>
    </div>

    <!-- Search / Date Filter -->
    <div class="row g-3 mb-4">
      <div class="col-lg-4">
        <input type="text" class="form-control-custom" id="searchOrders" placeholder="🔍 Search by order #, customer name..." oninput="loadOrdersTable()">
      </div>
      <div class="col-lg-3">
        <input type="date" class="form-control-custom" id="dateFrom" onchange="loadOrdersTable()">
      </div>
      <div class="col-lg-3">
        <input type="date" class="form-control-custom" id="dateTo" onchange="loadOrdersTable()">
      </div>
      <div class="col-lg-2">
        <span class="text-muted" style="font-size:var(--fs-sm);line-height:3rem;" id="totalOrdersCount"></span>
      </div>
    </div>

    <!-- Orders Table -->
    <div class="table-container">
      <table class="table mb-0">
        <thead>
          <tr>
            <th>Order #</th>
            <th>Customer</th>
            <th>Date</th>
            <th>Items</th>
            <th>Total</th>
            <th>Payment</th>
            <th>Status</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="ordersTableBody">
        </tbody>
      </table>
    </div>
  </main>

  <!-- Order Detail Modal -->
  <div class="modal fade" id="orderModal" tabindex="-1">
    <div class="modal-dialog modal-lg modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="orderModalTitle"><i class="fas fa-box me-2"></i>Order Details</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body" id="orderModalBody">
        </div>
        <div class="modal-footer" id="orderModalFooter">
        </div>
      </div>
    </div>
  </div>

  <!-- Invoice Preview Modal -->
  <div class="modal fade" id="invoicePreviewModal" tabindex="-1">
    <div class="modal-dialog modal-xl modal-dialog-centered modal-dialog-scrollable">
      <div class="modal-content" style="background:#f0f0f0;">
        <div class="modal-header" style="background:#1a1a2e;color:#fff;border:none;">
          <h5 class="modal-title"><i class="fas fa-file-invoice me-2"></i>Invoice Preview</h5>
          <div class="d-flex gap-2 ms-auto me-2">
            <button class="btn btn-sm" style="background:#00c897;color:#fff;" onclick="printInvoiceFromPreview()">
              <i class="fas fa-print me-1"></i> Print
            </button>
            <button class="btn btn-sm" style="background:#3b82f6;color:#fff;" onclick="downloadPDFFromPreview()">
              <i class="fas fa-file-pdf me-1"></i> PDF
            </button>
          </div>
          <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body p-0">
          <div id="invoicePreviewContainer" style="padding:20px;"></div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../js/utils.js"></script>
  <script src="../js/seed-data.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/app.js"></script>
  <script src="../js/invoice.js"></script>

  <script>
    let currentStatusFilter = 'all';
    let currentPreviewOrderId = null;

    document.addEventListener('DOMContentLoaded', () => {
      SeedData.init();
      Auth.init();
      if (!Auth.isAdmin()) { window.location.href = 'login.html'; return; }
      loadOrdersTable();
    });

    function filterOrders(status, btn) {
      document.querySelectorAll('#statusFilters .filter-pill').forEach(p => p.classList.remove('active'));
      btn.classList.add('active');
      currentStatusFilter = status;
      loadOrdersTable();
    }

    function loadOrdersTable() {
      let orders = App.getAll('orders');
      const search = document.getElementById('searchOrders').value.trim().toLowerCase();
      const dateFrom = document.getElementById('dateFrom').value;
      const dateTo = document.getElementById('dateTo').value;

      if (currentStatusFilter !== 'all') {
        orders = orders.filter(o => o.status === currentStatusFilter);
      }

      if (search) {
        orders = orders.filter(o =>
          (o.order_number || '').toLowerCase().includes(search) ||
          (o.customer_name || '').toLowerCase().includes(search) ||
          (o.customer_email || '').toLowerCase().includes(search)
        );
      }

      if (dateFrom) {
        orders = orders.filter(o => new Date(o.created_at) >= new Date(dateFrom));
      }
      if (dateTo) {
        const to = new Date(dateTo);
        to.setHours(23, 59, 59);
        orders = orders.filter(o => new Date(o.created_at) <= to);
      }

      orders.sort((a, b) => new Date(b.created_at) - new Date(a.created_at));

      document.getElementById('totalOrdersCount').textContent = `${orders.length} orders`;

      document.getElementById('ordersTableBody').innerHTML = orders.length === 0
        ? `<tr><td colspan="8" class="text-center py-4 text-muted">No orders found</td></tr>`
        : orders.map(order => {
          const statusInfo = Utils.getOrderStatusInfo(order.status);
          return `
            <tr>
              <td><strong>${order.order_number}</strong></td>
              <td>
                <div>${Utils.sanitize(order.customer_name || 'Guest')}</div>
                <small class="text-muted">${Utils.sanitize(order.customer_email || '')}</small>
              </td>
              <td><small>${Utils.formatDate(order.created_at)}</small></td>
              <td>${order.items.length} item${order.items.length !== 1 ? 's' : ''}</td>
              <td><strong>${Utils.formatCurrency(order.total)}</strong></td>
              <td><small>${order.payment_method || 'N/A'}</small></td>
              <td><span class="status-badge ${statusInfo.class}"><i class="fas ${statusInfo.icon} me-1"></i>${statusInfo.label}</span></td>
              <td>
                <div class="d-flex gap-1">
                  <button class="btn btn-sm btn-outline-primary" onclick="showOrderDetail('${order.id}')" title="View Details">
                    <i class="fas fa-eye" style="font-size:0.7rem;"></i>
                  </button>
                  <button class="btn btn-sm btn-outline-warning" onclick="showInvoicePreview('${order.id}')" title="Invoice Preview">
                    <i class="fas fa-file-invoice" style="font-size:0.7rem;"></i>
                  </button>
                  <button class="btn btn-sm btn-outline-info" onclick="Invoice.openPrintPreview('${order.id}')" title="Print Preview (New Window)">
                    <i class="fas fa-print" style="font-size:0.7rem;"></i>
                  </button>
                  <button class="btn btn-sm btn-outline-success" onclick="Invoice.generatePDF('${order.id}')" title="Download PDF">
                    <i class="fas fa-file-pdf" style="font-size:0.7rem;"></i>
                  </button>
                </div>
              </td>
            </tr>
          `;
        }).join('');
    }

    function showOrderDetail(orderId) {
      const order = App.getById('orders', orderId);
      if (!order) return;

      const statusInfo = Utils.getOrderStatusInfo(order.status);
      const nextStatuses = {
        'pending': ['confirmed', 'cancelled'],
        'confirmed': ['packed', 'cancelled'],
        'packed': ['dispatched'],
        'dispatched': ['delivered'],
        'delivered': [],
        'cancelled': []
      };

      document.getElementById('orderModalTitle').innerHTML = `<i class="fas fa-box me-2"></i>${order.order_number}`;

      document.getElementById('orderModalBody').innerHTML = `
        <div class="row g-3">
          <div class="col-md-6">
            <div class="glass-card" style="background:var(--gray-50);">
              <h6><i class="fas fa-user me-2 text-primary"></i>Customer</h6>
              <p class="mb-1 fw-bold">${Utils.sanitize(order.customer_name || 'Guest')}</p>
              <p class="mb-1 small text-muted"><i class="fas fa-envelope me-1"></i>${Utils.sanitize(order.customer_email || 'N/A')}</p>
              <p class="mb-0 small text-muted"><i class="fas fa-phone me-1"></i>${Utils.sanitize(order.customer_phone || 'N/A')}</p>
            </div>
          </div>
          <div class="col-md-6">
            <div class="glass-card" style="background:var(--gray-50);">
              <h6><i class="fas fa-map-marker-alt me-2 text-danger"></i>Delivery Address</h6>
              <p class="mb-0 small text-muted">
                ${order.address ? `${order.address.line1 || ''}<br>${order.address.city || ''}, ${order.address.state || ''} - ${order.address.pincode || ''}` : 'N/A'}
              </p>
            </div>
          </div>
          <div class="col-12">
            <h6>Order Items</h6>
            <div class="table-container">
              <table class="table mb-0">
                <thead><tr><th>#</th><th>Product</th><th class="text-center">Qty</th><th class="text-end">Price</th><th class="text-end">Total</th></tr></thead>
                <tbody>
                  ${order.items.map((item, i) => `
                    <tr>
                      <td>${i + 1}</td>
                      <td>${Utils.sanitize(item.name)}</td>
                      <td class="text-center">${item.quantity}</td>
                      <td class="text-end">${Utils.formatCurrency(item.price)}</td>
                      <td class="text-end">${Utils.formatCurrency(item.price * item.quantity)}</td>
                    </tr>
                  `).join('')}
                </tbody>
              </table>
            </div>
          </div>
          <div class="col-12">
            <div class="glass-card" style="background:var(--gray-50);">
              <div class="d-flex justify-content-between mb-1"><span class="small text-muted">Subtotal</span><span class="small">${Utils.formatCurrency(order.subtotal)}</span></div>
              <div class="d-flex justify-content-between mb-1"><span class="small text-muted">GST</span><span class="small">${Utils.formatCurrency(order.tax)}</span></div>
              <hr>
              <div class="d-flex justify-content-between fw-bold"><span>Total</span><span class="text-gradient" style="font-size:var(--fs-xl);">${Utils.formatCurrency(order.total)}</span></div>
            </div>
          </div>
          <div class="col-12">
            <div class="d-flex align-items-center gap-2 flex-wrap">
              <span class="fw-bold small">Status:</span>
              <span class="status-badge ${statusInfo.class}"><i class="fas ${statusInfo.icon} me-1"></i>${statusInfo.label}</span>
              <span class="fw-bold small ms-3">Payment:</span>
              <span class="small">${order.payment_method || 'N/A'}</span>
            </div>
          </div>
          ${order.notes ? `<div class="col-12"><p class="small text-muted"><strong>Notes:</strong> ${Utils.sanitize(order.notes)}</p></div>` : ''}
        </div>
      `;

      // Footer actions
      const next = nextStatuses[order.status] || [];
      let footerHTML = '';
      if (next.length > 0) {
        footerHTML += `<div class="d-flex gap-2 flex-wrap">`;
        next.forEach(s => {
          const info = Utils.getOrderStatusInfo(s);
          const btnClass = s === 'cancelled' ? 'btn btn-sm btn-outline-danger' : 'btn-primary-custom btn-sm-custom';
          footerHTML += `<button class="${btnClass}" onclick="updateOrderStatus('${orderId}', '${s}')"><i class="fas ${info.icon} me-1"></i>Mark as ${info.label}</button>`;
        });
        footerHTML += `</div>`;
      }
      footerHTML += `
        <div class="d-flex gap-2">
          <button class="btn btn-sm btn-outline-warning" onclick="bootstrap.Modal.getInstance(document.getElementById('orderModal')).hide(); showInvoicePreview('${orderId}')">
            <i class="fas fa-file-invoice me-1"></i>Preview Bill
          </button>
          <button class="btn btn-sm btn-outline-info" onclick="Invoice.openPrintPreview('${orderId}')">
            <i class="fas fa-print me-1"></i>Print
          </button>
          <button class="btn btn-sm btn-outline-success" onclick="Invoice.generatePDF('${orderId}')">
            <i class="fas fa-file-pdf me-1"></i>PDF
          </button>
        </div>
      `;

      document.getElementById('orderModalFooter').innerHTML = footerHTML;
      new bootstrap.Modal(document.getElementById('orderModal')).show();
    }

    function updateOrderStatus(orderId, newStatus) {
      const updates = { status: newStatus };
      if (newStatus === 'confirmed') updates.confirmed_at = new Date().toISOString();
      if (newStatus === 'delivered') updates.delivered_at = new Date().toISOString();

      App.update('orders', orderId, updates);
      Utils.showToast(`Order status updated to ${newStatus}`, 'success');
      
      bootstrap.Modal.getInstance(document.getElementById('orderModal')).hide();
      loadOrdersTable();
    }

    /**
     * Show inline invoice preview inside modal (Shobha Medical bill format)
     */
    function showInvoicePreview(orderId) {
      const order = App.getById('orders', orderId);
      if (!order) return;

      currentPreviewOrderId = orderId;

      // Generate invoice number if needed
      if (!order.invoice_number) {
        order.invoice_number = Utils.generateNumber('SL');
        App.update('orders', orderId, { invoice_number: order.invoice_number });
      }

      const ccCopy = Invoice.generateBillHTML(order, 'C/C');
      const ocCopy = Invoice.generateBillHTML(order, 'O/C');

      const previewCSS = `
        <style>
          @import url('https://fonts.googleapis.com/css2?family=Courier+Prime:wght@400;700&display=swap');
          
          .invoice-preview-page {
            font-family: 'Courier Prime', 'Courier New', Courier, monospace;
            font-size: 12px;
            line-height: 1.4;
            color: #000;
            background: #fff;
            max-width: 210mm;
            margin: 0 auto;
            padding: 8mm 12mm;
            box-shadow: 0 2px 20px rgba(0,0,0,0.08);
            border-radius: 4px;
          }

          .bill-copy { padding: 4mm 0; }

          .bill-header { text-align: center; margin-bottom: 3mm; }
          .shop-title { font-size: 18px; font-weight: 700; text-decoration: underline; letter-spacing: 1px; margin: 0 0 2px; }
          .shop-address { font-size: 11px; margin: 0; }

          .bill-info-row { display: flex; justify-content: space-between; font-size: 11px; padding: 1px 0; }
          .bill-info-row.center-row { justify-content: center; margin-bottom: 2mm; }

          .dashed-line { border-top: 1px dashed #000; margin: 2mm 0; }

          .bill-info-block { font-size: 11px; margin: 1mm 0; }
          .info-grid { display: flex; justify-content: space-between; }
          .info-left-block { flex: 1; }
          .info-right-block { text-align: right; min-width: 200px; }
          .info-left-block p, .info-right-block p { margin: 1px 0; }
          .indent { padding-left: 60px; }

          .bill-table { width: 100%; border-collapse: collapse; font-size: 11px; margin-top: 1mm; }
          .bill-table thead tr { border-bottom: 1px dashed #000; border-top: 1px dashed #000; }
          .bill-table th { text-align: left; padding: 2px 4px; font-weight: 700; font-size: 10px; }
          .bill-table td { padding: 2px 4px; vertical-align: top; }
          .bill-table .text-right { text-align: right; }
          .bill-table .text-center { text-align: center; }
          .bill-table .item-name { max-width: 140px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
          .bill-table .empty-row td { height: 16px; }

          .col-sno { width: 6%; } .col-name { width: 26%; } .col-pkg { width: 10%; }
          .col-mfg { width: 11%; } .col-batch { width: 14%; } .col-expiry { width: 10%; }
          .col-qty { width: 8%; text-align: center; } .col-amount { width: 15%; text-align: right; }

          .bill-spacer { height: 10mm; }
          .bill-totals { display: flex; justify-content: space-between; font-size: 12px; padding: 2mm 0; }

          .bill-footer { display: flex; justify-content: space-between; align-items: flex-end; font-size: 10px; margin-top: 3mm; padding-bottom: 2mm; }
          .footer-note { font-weight: 700; font-size: 9px; margin-bottom: 2px; }
          .footer-jurisdiction { font-size: 9px; }
          .pharmacist-label { font-weight: 700; font-size: 11px; text-align: right; }

          .bill-separator { border-top: 1px solid #000; margin: 6mm 0; position: relative; }
          .bill-separator::after { content: '✂'; position: absolute; top: -10px; left: 50%; transform: translateX(-50%); background: white; padding: 0 8px; font-size: 14px; }
        </style>
      `;

      document.getElementById('invoicePreviewContainer').innerHTML = `
        ${previewCSS}
        <div class="invoice-preview-page" id="invoicePreviewPage">
          ${ccCopy}
          <div class="bill-separator"></div>
          ${ocCopy}
        </div>
      `;

      new bootstrap.Modal(document.getElementById('invoicePreviewModal')).show();
    }

    /**
     * Print from preview modal
     */
    function printInvoiceFromPreview() {
      if (currentPreviewOrderId) {
        Invoice.openPrintPreview(currentPreviewOrderId);
      }
    }

    /**
     * Download PDF from preview modal
     */
    function downloadPDFFromPreview() {
      if (currentPreviewOrderId) {
        Invoice.generatePDF(currentPreviewOrderId);
      }
    }
  </script>
</body>
</html>
