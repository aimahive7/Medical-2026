<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agency Master — SHOBHA MEDICAL STORES Admin</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
  <link href="../style.css" rel="stylesheet">
  <style>
    .agency-card { 
      background: var(--bg-card); 
      border: var(--border-light); 
      border-radius: var(--radius-lg); 
      padding: 1.25rem; 
      margin-bottom: 1rem; 
      transition: all var(--transition-fast); 
      position: relative;
    }
    .agency-card:hover { 
      box-shadow: var(--shadow-md); 
      transform: translateY(-2px); 
    }
    .extra-fields-container { 
      background: var(--gray-50); 
      border-radius: var(--radius-md); 
      padding: 1rem; 
      margin-top: 1rem; 
    }
    .extra-field-row { 
      display: flex; 
      gap: 0.5rem; 
      margin-bottom: 0.5rem; 
    }
    .kpi-card { height: 100%; }
  </style>
</head>
<body>

  <!-- Admin Sidebar -->
  <aside class="admin-sidebar" id="adminSidebar">
    <div class="sidebar-brand">
      <h4><i class="fas fa-clinic-medical me-2" style="color:var(--primary-400);"></i>SHOBHA</h4>
      <span>Medical Stores — Admin</span>
    </div>
    <ul class="sidebar-nav">
      <li class="nav-item"><a class="nav-link" href="dashboard.html"><i class="fas fa-tachometer-alt"></i> Dashboard</a></li>
      <li class="nav-item"><a class="nav-link" href="products.html"><i class="fas fa-pills"></i> Products</a></li>
      <li class="nav-item"><a class="nav-link" href="inward.html"><i class="fas fa-truck-loading"></i> Inward Entry</a></li>
      <li class="nav-item"><a class="nav-link active" href="agency.html"><i class="fas fa-building"></i> Agency Master</a></li>
      <li class="nav-item"><a class="nav-link" href="approvals.html"><i class="fas fa-clipboard-check"></i> Approvals</a></li>
      <li class="nav-item"><a class="nav-link" href="orders.html"><i class="fas fa-clipboard-list"></i> Orders</a></li>
      <li class="nav-item"><a class="nav-link" href="settings.html"><i class="fas fa-cog"></i> Settings</a></li>
      <li class="nav-item" style="margin-top:2rem;"><a class="nav-link" href="../index.html"><i class="fas fa-store"></i> View Store</a></li>
      <li class="nav-item"><a class="nav-link text-danger" href="#" onclick="Auth.logout()"><i class="fas fa-sign-out-alt"></i> Logout</a></li>
    </ul>
  </aside>

  <!-- Main Content -->
  <main class="admin-main">
    <div class="admin-topbar">
      <div>
        <button class="btn btn-sm d-lg-none me-2" onclick="document.getElementById('adminSidebar').classList.toggle('show')"><i class="fas fa-bars"></i></button>
        <h2><i class="fas fa-building me-2 text-gradient"></i>Agency Master</h2>
      </div>
      <button class="btn-primary-custom btn-sm-custom" onclick="showAddModal()"><i class="fas fa-plus me-1"></i>Add Agency</button>
    </div>

    <!-- Search Section -->
    <div class="kpi-card mb-4" style="padding:1rem;">
      <div class="row g-2">
        <div class="col-md-10">
          <input type="text" class="form-control-custom" id="searchAgency" placeholder="Search by name, city, or GSTIN..." oninput="renderAgencies()">
        </div>
        <div class="col-md-2 text-end">
          <div class="text-muted small" style="margin-top:0.5rem;"><span id="agencyCount">0</span> Agencies</div>
        </div>
      </div>
    </div>

    <!-- Agency Grid/List -->
    <div class="row" id="agencyGrid">
      <!-- Agencies populated by JS -->
    </div>

    <!-- Add/Edit Modal -->
    <div class="modal fade" id="agencyModal" tabindex="-1">
      <div class="modal-dialog modal-lg modal-dialog-centered">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title" id="modalTitle">Add New Agency</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
          </div>
          <div class="modal-body">
            <form id="agencyForm">
              <input type="hidden" id="editId">
              <div class="row g-3">
                <div class="col-md-12">
                  <label class="form-label-custom">Agency Name *</label>
                  <input type="text" class="form-control-custom" id="name" required placeholder="e.g., Cipla Ltd">
                </div>
                <div class="col-md-6">
                  <label class="form-label-custom">Contact No</label>
                  <input type="text" class="form-control-custom" id="contact" placeholder="10-digit mobile">
                </div>
                <div class="col-md-6">
                  <label class="form-label-custom">Email ID</label>
                  <input type="email" class="form-control-custom" id="email" placeholder="email@example.com">
                </div>
                <div class="col-md-8">
                  <label class="form-label-custom">Address</label>
                  <input type="text" class="form-control-custom" id="address" placeholder="Store address">
                </div>
                <div class="col-md-4">
                  <label class="form-label-custom">City</label>
                  <input type="text" class="form-control-custom" id="city" placeholder="City name">
                </div>
                <div class="col-md-4">
                  <label class="form-label-custom">D.L. No</label>
                  <input type="text" class="form-control-custom" id="dl_no" placeholder="Drug License No">
                </div>
                <div class="col-md-4">
                  <label class="form-label-custom">FSSAI No</label>
                  <input type="text" class="form-control-custom" id="fssai_no" placeholder="FSSAI Number">
                </div>
                <div class="col-md-4">
                  <label class="form-label-custom">GSTIN No</label>
                  <input type="text" class="form-control-custom" id="gstin" placeholder="GST Number">
                </div>
                <div class="col-md-4">
                  <label class="form-label-custom">PAN No</label>
                  <input type="text" class="form-control-custom" id="pan" placeholder="PAN Card No">
                </div>
              </div>

              <!-- Extra Fields -->
              <div class="extra-fields-container">
                <div class="d-flex justify-content-between align-items-center mb-2">
                  <h6 class="mb-0 small fw-bold">Custom Fields</h6>
                  <button type="button" class="btn btn-sm btn-outline-primary" onclick="addExtraField()"><i class="fas fa-plus me-1"></i>Add Field</button>
                </div>
                <div id="extraFieldsList">
                  <!-- Dynamic rows go here -->
                </div>
              </div>
            </form>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn-outline-custom btn-sm-custom" data-bs-dismiss="modal">Cancel</button>
            <button type="button" class="btn-primary-custom btn-sm-custom" onclick="saveAgency()">Save Agency</button>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../js/utils.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/app.js"></script>
  <script src="../js/agency.js"></script>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      Auth.init();
      if (!Auth.isAdmin()) { window.location.href = 'login.html'; return; }
      renderAgencies();
    });

    function renderAgencies() {
      const q = document.getElementById('searchAgency').value.toLowerCase();
      const agencies = Agency.getAll().filter(a => 
        a.name.toLowerCase().includes(q) || 
        (a.city || '').toLowerCase().includes(q) || 
        (a.gstin || '').toLowerCase().includes(q)
      );

      document.getElementById('agencyCount').textContent = agencies.length;
      const grid = document.getElementById('agencyGrid');
      
      if (agencies.length === 0) {
        grid.innerHTML = '<div class="col-12 text-center py-5 text-muted"><h5>No agencies found</h5><p>Click "Add Agency" to create one.</p></div>';
        return;
      }

      grid.innerHTML = agencies.map(a => `
        <div class="col-md-6 col-lg-4">
          <div class="agency-card">
            <div class="d-flex justify-content-between align-items-start mb-2">
              <div>
                <h5 class="mb-1 text-gradient">${Utils.sanitize(a.name)}</h5>
                <small class="text-muted"><i class="fas fa-map-marker-alt me-1"></i>${Utils.sanitize(a.city || '—')}</small>
              </div>
              <div class="dropdown">
                <button class="btn btn-sm" data-bs-toggle="dropdown"><i class="fas fa-ellipsis-v"></i></button>
                <ul class="dropdown-menu">
                  <li><a class="dropdown-item" href="#" onclick="editAgency('${a.id}')"><i class="fas fa-edit me-2"></i>Edit</a></li>
                  <li><a class="dropdown-item text-danger" href="#" onclick="deleteAgency('${a.id}')"><i class="fas fa-trash-alt me-2"></i>Delete</a></li>
                </ul>
              </div>
            </div>
            <hr class="my-2 opacity-10">
            <div class="row g-2 small">
              <div class="col-6"><span class="text-muted">GSTIN:</span> <div>${Utils.sanitize(a.gstin || '—')}</div></div>
              <div class="col-6"><span class="text-muted">Contact:</span> <div>${Utils.sanitize(a.contact || '—')}</div></div>
              <div class="col-12"><span class="text-muted">Email:</span> <div>${Utils.sanitize(a.email || '—')}</div></div>
            </div>
            ${Object.keys(a.extra_fields || {}).length > 0 ? `
              <div class="mt-2 text-primary small">
                ${Object.entries(a.extra_fields).map(([k,v]) => `<span class="badge bg-primary-soft me-1">${k}: ${v}</span>`).join('')}
              </div>
            ` : ''}
          </div>
        </div>
      `).join('');
    }

    function showAddModal() {
      document.getElementById('modalTitle').textContent = 'Add New Agency';
      document.getElementById('agencyForm').reset();
      document.getElementById('editId').value = '';
      document.getElementById('extraFieldsList').innerHTML = '';
      new bootstrap.Modal(document.getElementById('agencyModal')).show();
    }

    function addExtraField(key = '', value = '') {
      const div = document.createElement('div');
      div.className = 'extra-field-row';
      div.innerHTML = `
        <input type="text" class="form-control-custom form-control-sm" placeholder="Label" value="${Utils.sanitize(key)}">
        <input type="text" class="form-control-custom form-control-sm" placeholder="Value" value="${Utils.sanitize(value)}">
        <button type="button" class="btn btn-sm btn-outline-danger" onclick="this.parentElement.remove()"><i class="fas fa-times"></i></button>
      `;
      document.getElementById('extraFieldsList').appendChild(div);
    }

    function saveAgency() {
      const data = {
        name: document.getElementById('name').value,
        contact: document.getElementById('contact').value,
        email: document.getElementById('email').value,
        address: document.getElementById('address').value,
        city: document.getElementById('city').value,
        dl_no: document.getElementById('dl_no').value,
        fssai_no: document.getElementById('fssai_no').value,
        gstin: document.getElementById('gstin').value,
        pan: document.getElementById('pan').value,
        extra_fields: {}
      };

      // Collect extra fields
      document.querySelectorAll('#extraFieldsList .extra-field-row').forEach(row => {
        const inputs = row.querySelectorAll('input');
        const k = inputs[0].value.trim();
        const v = inputs[1].value.trim();
        if (k) data.extra_fields[k] = v;
      });

      const editId = document.getElementById('editId').value;
      const result = editId ? Agency.update(editId, data) : Agency.add(data);

      if (result.success) {
        Utils.showToast(editId ? 'Agency updated' : 'Agency added', 'success');
        bootstrap.Modal.getInstance(document.getElementById('agencyModal')).hide();
        renderAgencies();
      } else {
        Utils.showToast(result.errors.join('\n'), 'error');
      }
    }

    function editAgency(id) {
      const a = Agency.getById(id);
      if (!a) return;
      document.getElementById('modalTitle').textContent = 'Edit Agency';
      document.getElementById('editId').value = a.id;
      document.getElementById('name').value = a.name || '';
      document.getElementById('contact').value = a.contact || '';
      document.getElementById('email').value = a.email || '';
      document.getElementById('address').value = a.address || '';
      document.getElementById('city').value = a.city || '';
      document.getElementById('dl_no').value = a.dl_no || '';
      document.getElementById('fssai_no').value = a.fssai_no || '';
      document.getElementById('gstin').value = a.gstin || '';
      document.getElementById('pan').value = a.pan || '';
      
      const list = document.getElementById('extraFieldsList');
      list.innerHTML = '';
      if (a.extra_fields) {
        Object.entries(a.extra_fields).forEach(([k,v]) => addExtraField(k,v));
      }

      new bootstrap.Modal(document.getElementById('agencyModal')).show();
    }

    function deleteAgency(id) {
      if (confirm('Are you sure you want to delete this agency?')) {
        Agency.delete(id);
        renderAgencies();
        Utils.showToast('Agency deleted', 'info');
      }
    }
  </script>
</body>
</html>
