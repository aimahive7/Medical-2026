<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login — SHOBHA MEDICAL STORES</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
  <link href="../style.css" rel="stylesheet">
</head>
<body style="background:var(--gradient-hero);min-height:100vh;display:flex;align-items:center;justify-content:center;">

  <div class="container">
    <div class="row justify-content-center">
      <div class="col-lg-4 col-md-6">
        <div class="glass-card fade-in" style="background:rgba(255,255,255,0.95);">
          <div class="text-center mb-4">
            <div style="width:72px;height:72px;border-radius:var(--radius-xl);background:var(--gradient-primary);display:flex;align-items:center;justify-content:center;margin:0 auto 1rem;">
              <i class="fas fa-user-shield" style="font-size:2rem;color:white;"></i>
            </div>
            <h3 style="font-size:var(--fs-2xl);">Admin Login</h3>
            <p class="text-muted" style="font-size:var(--fs-sm);">SHOBHA MEDICAL STORES — Dashboard</p>
          </div>

          <form onsubmit="handleAdminLogin(event)">
            <div class="mb-3">
              <label class="form-label-custom">Email Address</label>
              <input type="email" class="form-control-custom" id="adminEmail" required placeholder="admin@shobha.com" value="admin@shobha.com">
            </div>
            <div class="mb-4">
              <label class="form-label-custom">Password</label>
              <input type="password" class="form-control-custom" id="adminPassword" required placeholder="Enter password" value="admin123">
            </div>
            <button type="submit" class="btn-primary-custom w-100 justify-content-center" id="adminLoginBtn">
              <i class="fas fa-sign-in-alt me-1"></i> Login to Dashboard
            </button>
          </form>

          <div class="text-center mt-3">
            <a href="../index.html" class="text-muted" style="font-size:var(--fs-sm);">
              <i class="fas fa-arrow-left me-1"></i> Back to Store
            </a>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../js/utils.js"></script>
  <script src="../js/seed-data.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/app.js"></script>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      SeedData.init();
      Auth.init();
      
      // If already logged in as admin, redirect
      if (Auth.isAdmin()) {
        window.location.href = 'dashboard.html';
      }
    });

    async function handleAdminLogin(e) {
      e.preventDefault();
      const btn = document.getElementById('adminLoginBtn');
      btn.disabled = true;
      btn.innerHTML = '<i class="fas fa-spinner fa-spin me-1"></i> Authenticating...';

      const email = document.getElementById('adminEmail').value;
      const password = document.getElementById('adminPassword').value;

      const result = await Auth.adminLogin(email, password);

      if (result.success) {
        Utils.showToast('Welcome to Admin Dashboard!', 'success');
        setTimeout(() => window.location.href = 'dashboard.html', 800);
      } else {
        Utils.showToast(result.message, 'error');
        btn.disabled = false;
        btn.innerHTML = '<i class="fas fa-sign-in-alt me-1"></i> Login to Dashboard';
      }
    }
  </script>
</body>
</html>
