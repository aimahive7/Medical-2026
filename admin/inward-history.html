<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inward History — SHOBHA MEDICAL STORES Admin</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
  <link href="../style.css" rel="stylesheet">
  <style>
    .history-card { 
      background: var(--bg-card); 
      border: var(--border-light); 
      border-radius: var(--radius-lg); 
      padding: 1.25rem; 
      margin-bottom: 1rem; 
      transition: all var(--transition-fast); 
      cursor: pointer;
    }
    .history-card:hover { 
      box-shadow: var(--shadow-md); 
      transform: translateY(-2px); 
    }
    .bill-meta { 
      display: flex; 
      gap: 1rem; 
      color: var(--text-muted); 
      font-size: var(--fs-xs); 
    }
    .bill-meta i { margin-right: 0.25rem; }
    .amount-display { 
      font-weight: 700; 
      color: var(--primary-700); 
      font-size: var(--fs-lg); 
    }
    .filter-section { 
      background: var(--bg-card); 
      border: var(--border-light); 
      border-radius: var(--radius-xl); 
      padding: 1.5rem; 
      margin-bottom: 2rem; 
    }
  </style>
</head>
<body>

  <!-- Admin Sidebar -->
  <aside class="admin-sidebar" id="adminSidebar">
    <div class="sidebar-brand">
      <h4><i class="fas fa-clinic-medical me-2" style="color:var(--primary-400);"></i>SHOBHA</h4>
      <span>Medical Stores — Admin</span>
    </div>
    <ul class="sidebar-nav">
      <li class="nav-item"><a class="nav-link" href="dashboard.html"><i class="fas fa-tachometer-alt"></i> Dashboard</a></li>
      <li class="nav-item"><a class="nav-link" href="products.html"><i class="fas fa-pills"></i> Products</a></li>
      <li class="nav-item"><a class="nav-link" href="inward.html"><i class="fas fa-truck-loading"></i> Inward Entry</a></li>
      <li class="nav-item"><a class="nav-link" href="agency.html"><i class="fas fa-building"></i> Agency Master</a></li>
      <li class="nav-item"><a class="nav-link active" href="inward-history.html"><i class="fas fa-history"></i> Inward History</a></li>
      <li class="nav-item"><a class="nav-link" href="approvals.html"><i class="fas fa-clipboard-check"></i> Approvals</a></li>
      <li class="nav-item"><a class="nav-link" href="orders.html"><i class="fas fa-clipboard-list"></i> Orders</a></li>
      <li class="nav-item"><a class="nav-link" href="settings.html"><i class="fas fa-cog"></i> Settings</a></li>
      <li class="nav-item" style="margin-top:2rem;"><a class="nav-link" href="../index.html"><i class="fas fa-store"></i> View Store</a></li>
      <li class="nav-item"><a class="nav-link text-danger" href="#" onclick="Auth.logout()"><i class="fas fa-sign-out-alt"></i> Logout</a></li>
    </ul>
  </aside>

  <!-- Main Content -->
  <main class="admin-main">
    <div class="admin-topbar">
      <div>
        <button class="btn btn-sm d-lg-none me-2" onclick="document.getElementById('adminSidebar').classList.toggle('show')"><i class="fas fa-bars"></i></button>
        <h2><i class="fas fa-history me-2 text-gradient"></i>Inward Bill History</h2>
      </div>
      <a href="inward.html" class="btn-primary-custom btn-sm-custom"><i class="fas fa-plus me-1"></i>New Inward</a>
    </div>

    <!-- Filters -->
    <div class="filter-section shadow-sm">
      <div class="row g-3">
        <div class="col-md-4">
          <label class="form-label-custom">Search</label>
          <input type="text" class="form-control-custom" id="searchQ" placeholder="Inward #, Agency, or Bill #..." oninput="renderHistory()">
        </div>
        <div class="col-md-3">
          <label class="form-label-custom">From Date</label>
          <input type="date" class="form-control-custom" id="dateFrom" onchange="renderHistory()">
        </div>
        <div class="col-md-3">
          <label class="form-label-custom">To Date</label>
          <input type="date" class="form-control-custom" id="dateTo" onchange="renderHistory()">
        </div>
        <div class="col-md-2 d-flex align-items-end">
          <button class="btn btn-outline-secondary w-100 btn-sm-custom" onclick="resetFilters()">Reset</button>
        </div>
      </div>
    </div>

    <!-- History List -->
    <div id="historyList">
      <!-- Inward bills populated by JS -->
    </div>

    <!-- Details Modal -->
    <div class="modal fade" id="billModal" tabindex="-1">
      <div class="modal-dialog modal-xl modal-dialog-centered modal-dialog-scrollable">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title" id="modalTitle">Bill Details</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
          </div>
          <div class="modal-body" id="billDetailsBody"></div>
          <div class="modal-footer">
            <button class="btn btn-outline-danger" id="deleteBtn"><i class="fas fa-trash-alt me-1"></i>Delete Bill</button>
            <button class="btn btn-outline-primary" id="editBtn"><i class="fas fa-edit me-1"></i>Edit Bill</button>
            <button class="btn-primary-custom btn-sm-custom" data-bs-dismiss="modal">Close</button>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../js/utils.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/app.js"></script>
  <script src="../js/inward.js"></script>
  <script src="../js/inward-history.js"></script>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      Auth.init();
      if (!Auth.isAdmin()) { window.location.href = 'login.html'; return; }
      renderHistory();
    });

    function renderHistory() {
      const filters = {
        search: document.getElementById('searchQ').value,
        date_from: document.getElementById('dateFrom').value,
        date_to: document.getElementById('dateTo').value
      };

      const bills = InwardHistory.filterBills(filters);
      const list = document.getElementById('historyList');

      if (bills.length === 0) {
        list.innerHTML = '<div class="empty-state py-5 text-center text-muted"><h5>No inward bills found</h5><p>Try adjusting your search or filters.</p></div>';
        return;
      }

      list.innerHTML = bills.map(b => `
        <div class="history-card" onclick="viewBill('${b.id}')">
          <div class="d-flex justify-content-between align-items-start">
            <div>
              <div class="d-flex align-items-center mb-2">
                <h5 class="mb-0 fw-bold text-primary me-3">${b.inward_number}</h5>
                <span class="badge ${b.payment_mode === 'cash' ? 'bg-success-soft text-success' : 'bg-info-soft text-info'}">${b.payment_mode.toUpperCase()}</span>
              </div>
              <div class="mb-2 fw-semibold" style="font-size:1.1rem;">${Utils.sanitize(b.agency_name)}</div>
              <div class="bill-meta">
                <span><i class="fas fa-receipt"></i>Bill: ${Utils.sanitize(b.bill_no)}</span>
                <span><i class="fas fa-calendar"></i>${Utils.formatDate(b.bill_date)}</span>
                <span><i class="fas fa-boxes"></i>${b.item_count} items</span>
              </div>
            </div>
            <div class="text-end">
              <div class="amount-display">${Utils.formatCurrency(b.grand_total)}</div>
              <div class="text-muted small mt-1">Total Qty: ${b.total_qty}</div>
              <div class="mt-2">
                <i class="fas fa-chevron-right text-muted"></i>
              </div>
            </div>
          </div>
        </div>
      `).join('');
    }

    function resetFilters() {
      document.getElementById('searchQ').value = '';
      document.getElementById('dateFrom').value = '';
      document.getElementById('dateTo').value = '';
      renderHistory();
    }

    function viewBill(id) {
      const b = Inward.getById(id);
      if (!b) return;

      document.getElementById('modalTitle').textContent = `Inward Bill Detail — ${b.inward_number}`;
      
      document.getElementById('billDetailsBody').innerHTML = `
        <div class="row g-3 mb-4">
          <div class="col-md-3"><div><small class="text-muted d-block">Agency</small><strong>${Utils.sanitize(b.agency_name)}</strong></div></div>
          <div class="col-md-3"><div><small class="text-muted d-block">Bill No</small><strong>${Utils.sanitize(b.bill_no)}</strong></div></div>
          <div class="col-md-3"><div><small class="text-muted d-block">Bill Date</small><strong>${Utils.formatDate(b.bill_date)}</strong></div></div>
          <div class="col-md-3"><div><small class="text-muted d-block">Payment</small><strong>${b.payment_mode.toUpperCase()}</strong></div></div>
        </div>
        <div class="table-container small">
          <table class="table mb-0">
            <thead>
              <tr><th>#</th><th>Product</th><th>Batch</th><th>Qty</th><th>Free</th><th>MRP</th><th>Rate</th><th>Disc</th><th>GST</th><th>Total</th></tr>
            </thead>
            <tbody>
              ${b.items.map((item, i) => `
                <tr>
                  <td>${i+1}</td>
                  <td>${Utils.sanitize(item.product_name)}</td>
                  <td>${Utils.sanitize(item.batch)}</td>
                  <td>${Utils.formatExpiry(item.expiry)}</td>
                  <td>${item.qty}</td>
                  <td>${item.free}</td>
                  <td>₹${item.mrp || 0}</td>
                  <td>₹${item.rate}</td>
                  <td>₹${item.discount_amount}</td>
                  <td>${item.gst}%</td>
                  <td class="fw-bold">₹${item.amount}</td>
                </tr>
              `).join('')}
            </tbody>
            <tfoot>
              <tr class="fw-bold">
                <td colspan="8" class="text-end">Summary:</td>
                <td colspan="2">
                  <div class="d-flex justify-content-between"><span>Subtotal:</span><span>${Utils.formatCurrency(b.total_subtotal)}</span></div>
                  <div class="d-flex justify-content-between text-danger"><span>Row Disc:</span><span>-${Utils.formatCurrency(b.total_row_discount || b.total_discount || 0)}</span></div>
                  ${b.bill_discount_amount > 0 ? `<div class="d-flex justify-content-between text-danger"><span>Bill Disc:</span><span>-${Utils.formatCurrency(b.bill_discount_amount)}</span></div>` : ''}
                  <div class="d-flex justify-content-between"><span>GST:</span><span>${Utils.formatCurrency(b.total_gst)}</span></div>
                  <div class="d-flex justify-content-between text-muted" style="font-size:0.8rem;"><span>Round Off:</span><span>${Utils.formatCurrency(b.round_off || 0)}</span></div>
                  <hr class="my-1">
                  <div class="d-flex justify-content-between text-primary" style="font-size:1.1rem;"><span>Total:</span><span>${Utils.formatCurrency(b.grand_total)}</span></div>
                </td>
              </tr>
            </tfoot>
          </table>
        </div>
      `;

      document.getElementById('editBtn').onclick = () => window.location.href = `inward.html?id=${b.id}`;
      document.getElementById('deleteBtn').onclick = () => {
        if (confirm('Are you sure you want to delete this bill? This adjustment will NOT automatically reverse stock.')) {
          Inward.deleteBill(b.id);
          bootstrap.Modal.getInstance(document.getElementById('billModal')).hide();
          renderHistory();
          Utils.showToast('Bill deleted', 'warning');
        }
      };

      new bootstrap.Modal(document.getElementById('billModal')).show();
    }
  </script>
</body>
</html>
