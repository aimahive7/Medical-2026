<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bill Approvals — SHOBHA MEDICAL STORES Admin</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
  <link href="../style.css" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body>

  <!-- Admin Sidebar -->
  <aside class="admin-sidebar" id="adminSidebar">
    <div class="sidebar-brand">
      <h4><i class="fas fa-clinic-medical me-2" style="color:var(--primary-400);"></i>SHOBHA</h4>
      <span>Medical Stores — Admin</span>
    </div>
    <ul class="sidebar-nav">
      <li class="nav-item"><a class="nav-link" href="dashboard.html"><i class="fas fa-tachometer-alt"></i> Dashboard</a></li>
      <li class="nav-item"><a class="nav-link" href="products.html"><i class="fas fa-pills"></i> Products</a></li>
      <li class="nav-item"><a class="nav-link active" href="approvals.html"><i class="fas fa-clipboard-check"></i> Approvals <span class="badge bg-warning ms-1" id="sidebarPendingCount">0</span></a></li>
      <li class="nav-item"><a class="nav-link" href="orders.html"><i class="fas fa-clipboard-list"></i> Orders</a></li>
      <li class="nav-item"><a class="nav-link" href="settings.html"><i class="fas fa-cog"></i> Settings</a></li>
      <li class="nav-item" style="margin-top:2rem;"><a class="nav-link" href="../index.html"><i class="fas fa-store"></i> View Store</a></li>
      <li class="nav-item"><a class="nav-link text-danger" href="#" onclick="Auth.logout()"><i class="fas fa-sign-out-alt"></i> Logout</a></li>
    </ul>
  </aside>

  <main class="admin-main">
    <div class="admin-topbar">
      <div>
        <button class="btn btn-sm d-lg-none me-2" onclick="document.getElementById('adminSidebar').classList.toggle('show')">
          <i class="fas fa-bars"></i>
        </button>
        <h2><i class="fas fa-clipboard-check me-2 text-gradient"></i>Bill Approvals</h2>
      </div>
      <div class="d-flex align-items-center gap-2">
        <span class="status-badge status-pending-approval" id="pendingCountBadge">0 Pending</span>
      </div>
    </div>

    <!-- Status Filter Tabs -->
    <div class="filter-pills mb-4" id="statusFilters">
      <button class="filter-pill active" onclick="filterBills('pending_approval', this)">🕐 Pending Approval</button>
      <button class="filter-pill" onclick="filterBills('approved', this)">✅ Approved</button>
      <button class="filter-pill" onclick="filterBills('rejected', this)">❌ Rejected</button>
      <button class="filter-pill" onclick="filterBills('all', this)">📋 All</button>
    </div>

    <!-- Search -->
    <div class="row g-3 mb-4">
      <div class="col-lg-5">
        <input type="text" class="form-control-custom" id="searchBills" placeholder="🔍 Search by bill #, customer name..." oninput="loadBillsTable()">
      </div>
      <div class="col-lg-3">
        <input type="date" class="form-control-custom" id="dateFrom" onchange="loadBillsTable()">
      </div>
      <div class="col-lg-2">
        <input type="date" class="form-control-custom" id="dateTo" onchange="loadBillsTable()">
      </div>
      <div class="col-lg-2">
        <span class="text-muted" style="font-size:var(--fs-sm);line-height:3rem;" id="totalBillsCount"></span>
      </div>
    </div>

    <!-- Bills Table -->
    <div class="table-container">
      <table class="table mb-0">
        <thead>
          <tr>
            <th>Bill #</th>
            <th>Customer</th>
            <th>Date</th>
            <th>Items</th>
            <th>GST</th>
            <th>Total</th>
            <th>Status</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="billsTableBody">
        </tbody>
      </table>
    </div>
  </main>

  <!-- Bill Detail / Edit Modal -->
  <div class="modal fade" id="billModal" tabindex="-1">
    <div class="modal-dialog modal-xl modal-dialog-centered modal-dialog-scrollable">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="billModalTitle"><i class="fas fa-file-invoice me-2"></i>Bill Details</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body" id="billModalBody"></div>
        <div class="modal-footer" id="billModalFooter"></div>
      </div>
    </div>
  </div>

  <!-- Reject Reason Modal -->
  <div class="modal fade" id="rejectModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-header" style="background:var(--danger-light);">
          <h5 class="modal-title text-danger"><i class="fas fa-times-circle me-2"></i>Reject Bill</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <label class="form-label-custom">Rejection Reason *</label>
          <textarea class="form-control-custom" id="rejectReason" rows="3" placeholder="Enter reason for rejection..." required></textarea>
        </div>
        <div class="modal-footer">
          <button class="btn-outline-custom btn-sm-custom" data-bs-dismiss="modal">Cancel</button>
          <button class="btn btn-sm btn-danger" onclick="confirmReject()">
            <i class="fas fa-times me-1"></i>Reject Bill
          </button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../js/utils.js"></script>
  <script src="../js/seed-data.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/app.js"></script>
  <script src="../js/invoice.js"></script>

  <script>
    let currentFilter = 'pending_approval';
    let currentBillId = null;

    document.addEventListener('DOMContentLoaded', async () => {
      await SeedData.init();
      Auth.init();
      if (!Auth.isAdmin()) { window.location.href = 'login.html'; return; }
      loadBillsTable();
      updatePendingCount();
    });

    function updatePendingCount() {
      const count = App.getPendingBillsCount();
      document.getElementById('sidebarPendingCount').textContent = count;
      document.getElementById('sidebarPendingCount').style.display = count > 0 ? 'inline' : 'none';
      document.getElementById('pendingCountBadge').textContent = `${count} Pending`;
    }

    function filterBills(status, btn) {
      document.querySelectorAll('#statusFilters .filter-pill').forEach(p => p.classList.remove('active'));
      btn.classList.add('active');
      currentFilter = status;
      loadBillsTable();
    }

    function loadBillsTable() {
      let bills = App.getAll('bills');
      const search = (document.getElementById('searchBills').value || '').trim().toLowerCase();
      const dateFrom = document.getElementById('dateFrom').value;
      const dateTo = document.getElementById('dateTo').value;

      // Filter by status
      if (currentFilter !== 'all') {
        bills = bills.filter(b => b.status === currentFilter);
      }

      // Search
      if (search) {
        bills = bills.filter(b =>
          (b.bill_number || '').toLowerCase().includes(search) ||
          (b.customer_name || '').toLowerCase().includes(search) ||
          (b.customer_email || '').toLowerCase().includes(search)
        );
      }

      // Date filter
      if (dateFrom) bills = bills.filter(b => new Date(b.created_at) >= new Date(dateFrom));
      if (dateTo) {
        const to = new Date(dateTo); to.setHours(23, 59, 59);
        bills = bills.filter(b => new Date(b.created_at) <= to);
      }

      // Sort newest first
      bills.sort((a, b) => new Date(b.created_at) - new Date(a.created_at));

      document.getElementById('totalBillsCount').textContent = `${bills.length} bills`;

      document.getElementById('billsTableBody').innerHTML = bills.length === 0
        ? `<tr><td colspan="8" class="text-center py-4 text-muted">No bills found</td></tr>`
        : bills.map(bill => {
          const statusInfo = Utils.getOrderStatusInfo(bill.status);
          return `
            <tr>
              <td><strong>${bill.bill_number}</strong></td>
              <td>
                <div>${Utils.sanitize(bill.customer_name || 'Guest')}</div>
                <small class="text-muted">${Utils.sanitize(bill.customer_phone || '')}</small>
              </td>
              <td><small>${Utils.formatDate(bill.created_at)}</small></td>
              <td>${bill.items.length} item${bill.items.length !== 1 ? 's' : ''}</td>
              <td><small>${Utils.formatCurrency(bill.total_gst || 0)}</small></td>
              <td><strong>${Utils.formatCurrency(bill.grand_total)}</strong></td>
              <td><span class="status-badge ${statusInfo.class}"><i class="fas ${statusInfo.icon} me-1"></i>${statusInfo.label}</span></td>
              <td>
                <div class="d-flex gap-1">
                  <button class="btn btn-sm btn-outline-primary" onclick="showBillDetail('${bill.id}')" title="View/Edit">
                    <i class="fas fa-eye" style="font-size:0.7rem;"></i>
                  </button>
                  ${bill.status === 'pending_approval' ? `
                    <button class="btn btn-sm btn-outline-success" onclick="quickApprove('${bill.id}')" title="Approve">
                      <i class="fas fa-check" style="font-size:0.7rem;"></i>
                    </button>
                    <button class="btn btn-sm btn-outline-danger" onclick="showRejectModal('${bill.id}')" title="Reject">
                      <i class="fas fa-times" style="font-size:0.7rem;"></i>
                    </button>
                  ` : ''}
                  ${bill.status === 'approved' ? `
                    <button class="btn btn-sm btn-outline-warning" onclick="previewInvoice('${bill.id}')" title="Invoice">
                      <i class="fas fa-file-invoice" style="font-size:0.7rem;"></i>
                    </button>
                  ` : ''}
                </div>
              </td>
            </tr>
          `;
        }).join('');
    }

    function showBillDetail(billId) {
      const bill = App.getById('bills', billId);
      if (!bill) return;
      currentBillId = billId;

      const statusInfo = Utils.getOrderStatusInfo(bill.status);
      const isPending = bill.status === 'pending_approval';

      document.getElementById('billModalTitle').innerHTML = `<i class="fas fa-file-invoice me-2"></i>${bill.bill_number}`;

      // GST Breakdown by rate
      const gstGroups = {};
      bill.items.forEach(item => {
        const rate = item.gst_rate || 5;
        if (!gstGroups[rate]) gstGroups[rate] = { taxable: 0, gst: 0, total: 0 };
        gstGroups[rate].taxable += item.base_price;
        gstGroups[rate].gst += item.gst_amount;
        gstGroups[rate].total += item.total;
      });

      document.getElementById('billModalBody').innerHTML = `
        <div class="row g-3">
          <!-- Customer Info -->
          <div class="col-md-6">
            <div class="glass-card" style="background:var(--gray-50);">
              <h6><i class="fas fa-user me-2 text-primary"></i>Customer</h6>
              <p class="mb-1 fw-bold">${Utils.sanitize(bill.customer_name || 'Guest')}</p>
              <p class="mb-1 small text-muted"><i class="fas fa-phone me-1"></i>${Utils.sanitize(bill.customer_phone || 'N/A')}</p>
              <p class="mb-0 small text-muted"><i class="fas fa-envelope me-1"></i>${Utils.sanitize(bill.customer_email || 'N/A')}</p>
            </div>
          </div>
          <div class="col-md-6">
            <div class="glass-card" style="background:var(--gray-50);">
              <h6><i class="fas fa-map-marker-alt me-2 text-danger"></i>Delivery</h6>
              <p class="mb-0 small text-muted">
                ${bill.address ? `${bill.address.line1 || ''}<br>${bill.address.city || ''}, ${bill.address.state || ''} - ${bill.address.pincode || ''}` : 'N/A'}
              </p>
            </div>
          </div>

          <!-- Items Table (Editable if pending) -->
          <div class="col-12">
            <h6><i class="fas fa-list me-1"></i>Bill Items ${isPending ? '<small class="text-success">(Editable)</small>' : ''}</h6>
            <div class="table-container">
              <table class="table mb-0" id="billItemsTable">
                <thead>
                  <tr>
                    <th>#</th>
                    <th>Product</th>
                    <th>Batch</th>
                    <th>Expiry</th>
                    <th>GST%</th>
                    <th class="text-center">Qty</th>
                    <th class="text-end">MRP</th>
                    <th class="text-end">Base</th>
                    <th class="text-end">GST</th>
                    <th class="text-end">Total</th>
                    ${isPending ? '<th>Actions</th>' : ''}
                  </tr>
                </thead>
                <tbody>
                  ${bill.items.map((item, i) => `
                    <tr>
                      <td>${i + 1}</td>
                      <td><strong>${Utils.sanitize(item.name)}</strong></td>
                      <td><small>${item.batch_number || 'N/A'}</small></td>
                      <td><small>${item.expiry_date ? Utils.formatDate(item.expiry_date) : '—'}</small></td>
                      <td><small>${item.gst_rate}%</small></td>
                      <td class="text-center">
                        ${isPending ? `<input type="number" class="form-control form-control-sm text-center" value="${item.quantity}" min="1" style="width:60px;" onchange="updateBillItem('${billId}', ${i}, 'quantity', this.value)">` : item.quantity}
                      </td>
                      <td class="text-end">
                        ${isPending ? `<input type="number" class="form-control form-control-sm text-end" value="${item.mrp}" min="0" step="0.01" style="width:80px;" onchange="updateBillItem('${billId}', ${i}, 'mrp', this.value)">` : Utils.formatCurrency(item.mrp)}
                      </td>
                      <td class="text-end"><small>${Utils.formatCurrency(item.base_price)}</small></td>
                      <td class="text-end"><small class="text-success">${Utils.formatCurrency(item.gst_amount)}</small></td>
                      <td class="text-end"><strong>${Utils.formatCurrency(item.total)}</strong></td>
                      ${isPending ? `<td><button class="btn btn-sm btn-outline-danger" onclick="removeBillItem('${billId}', ${i})"><i class="fas fa-trash" style="font-size:0.6rem;"></i></button></td>` : ''}
                    </tr>
                  `).join('')}
                </tbody>
              </table>
            </div>
          </div>

          <!-- GST Breakup -->
          <div class="col-md-6">
            <div class="glass-card" style="background:var(--primary-50);">
              <h6><i class="fas fa-calculator me-2"></i>GST Breakup (Inclusive)</h6>
              ${Object.entries(gstGroups).map(([rate, data]) => `
                <div class="d-flex justify-content-between mb-1">
                  <span class="small">GST @ ${rate}%</span>
                  <span class="small"><strong>${Utils.formatCurrency(data.gst)}</strong> <span class="text-muted">(on ${Utils.formatCurrency(data.taxable)})</span></span>
                </div>
              `).join('')}
              <hr>
              <div class="d-flex justify-content-between">
                <span class="fw-bold">Total GST</span>
                <span class="fw-bold text-success">${Utils.formatCurrency(bill.total_gst || 0)}</span>
              </div>
            </div>
          </div>

          <!-- Totals -->
          <div class="col-md-6">
            <div class="glass-card" style="background:var(--gray-50);">
              <h6><i class="fas fa-receipt me-2"></i>Bill Summary</h6>
              <div class="d-flex justify-content-between mb-1"><span class="small text-muted">Base Amount</span><span class="small">${Utils.formatCurrency(bill.subtotal)}</span></div>
              <div class="d-flex justify-content-between mb-1"><span class="small text-muted">Total GST</span><span class="small text-success">${Utils.formatCurrency(bill.total_gst || 0)}</span></div>
              <hr>
              <div class="d-flex justify-content-between fw-bold"><span>Grand Total</span><span class="text-gradient" style="font-size:var(--fs-xl);">${Utils.formatCurrency(bill.grand_total)}</span></div>
              <div class="mt-2">
                <small class="text-muted"><i class="fas fa-truck me-1"></i>Delivery: <strong>${bill.delivery_charge === 0 ? 'FREE' : Utils.formatCurrency(bill.delivery_charge)}</strong> (separate)</small>
              </div>
            </div>
          </div>

          <!-- Status & Info -->
          <div class="col-12">
            <div class="d-flex align-items-center gap-3 flex-wrap">
              <span class="fw-bold small">Status:</span>
              <span class="status-badge ${statusInfo.class}"><i class="fas ${statusInfo.icon} me-1"></i>${statusInfo.label}</span>
              <span class="fw-bold small ms-2">Payment:</span>
              <span class="small">${bill.payment_method || 'N/A'}</span>
              ${bill.approved_at ? `<span class="small text-muted ms-2"><i class="fas fa-check me-1"></i>Approved: ${Utils.formatDateTime(bill.approved_at)}</span>` : ''}
              ${bill.rejection_reason ? `<span class="small text-danger ms-2"><i class="fas fa-times me-1"></i>Reason: ${Utils.sanitize(bill.rejection_reason)}</span>` : ''}
            </div>
          </div>
          ${bill.notes ? `<div class="col-12"><p class="small text-muted"><strong>Notes:</strong> ${Utils.sanitize(bill.notes)}</p></div>` : ''}
        </div>
      `;

      // Footer actions
      let footerHTML = '';
      if (isPending) {
        footerHTML = `
          <div class="d-flex gap-2 w-100 justify-content-between flex-wrap">
            <button class="btn btn-sm btn-outline-danger" onclick="showRejectModal('${billId}')">
              <i class="fas fa-times me-1"></i>Reject
            </button>
            <button class="btn-primary-custom btn-sm-custom" onclick="approveBill('${billId}')">
              <i class="fas fa-check-double me-1"></i>Approve & Deduct Stock
            </button>
          </div>
        `;
      } else if (bill.status === 'approved') {
        footerHTML = `
          <div class="d-flex gap-2">
            <button class="btn btn-sm btn-outline-warning" onclick="previewInvoice('${billId}')">
              <i class="fas fa-file-invoice me-1"></i>Invoice
            </button>
            <button class="btn btn-sm btn-outline-info" onclick="printInvoice('${billId}')">
              <i class="fas fa-print me-1"></i>Print
            </button>
          </div>
        `;
      }
      document.getElementById('billModalFooter').innerHTML = footerHTML;

      new bootstrap.Modal(document.getElementById('billModal')).show();
    }

    // --- Inline Bill Item Editing ---
    function updateBillItem(billId, itemIndex, field, value) {
      const bill = App.getById('bills', billId);
      if (!bill || bill.status !== 'pending_approval') return;

      const item = bill.items[itemIndex];
      if (!item) return;

      if (field === 'quantity') item.quantity = parseInt(value) || 1;
      if (field === 'mrp') item.mrp = parseFloat(value) || 0;

      // Recalculate item
      const base = Utils.calculateBasePrice(item.mrp, item.gst_rate);
      const gst = Utils.calculateGSTFromMRP(item.mrp, item.gst_rate);
      item.base_price = base * item.quantity;
      item.gst_amount = gst * item.quantity;
      item.total = item.mrp * item.quantity;

      // Recalculate bill totals
      const session = Auth.getSession();
      const result = App.modifyBill(billId, session.user_id, bill.items);
      if (result.success) {
        Utils.showToast('Bill item updated', 'success');
        showBillDetail(billId);
      }
    }

    function removeBillItem(billId, itemIndex) {
      const bill = App.getById('bills', billId);
      if (!bill || bill.status !== 'pending_approval') return;

      if (bill.items.length <= 1) {
        Utils.showToast('Cannot remove the last item. Reject the bill instead.', 'warning');
        return;
      }

      bill.items.splice(itemIndex, 1);
      const session = Auth.getSession();
      App.modifyBill(billId, session.user_id, bill.items);
      Utils.showToast('Item removed', 'success');
      showBillDetail(billId);
    }

    // --- Approve ---
    function approveBill(billId) {
      if (!confirm('Approve this bill? Stock will be deducted from batches.')) return;
      
      const session = Auth.getSession();
      const result = App.approveBill(billId, session.user_id);
      
      if (result.success) {
        Utils.showToast(result.message, 'success');
        bootstrap.Modal.getInstance(document.getElementById('billModal'))?.hide();
        loadBillsTable();
        updatePendingCount();
      } else {
        Utils.showToast(result.message, 'error');
      }
    }

    function quickApprove(billId) {
      approveBill(billId);
    }

    // --- Reject ---
    function showRejectModal(billId) {
      currentBillId = billId;
      document.getElementById('rejectReason').value = '';
      bootstrap.Modal.getInstance(document.getElementById('billModal'))?.hide();
      new bootstrap.Modal(document.getElementById('rejectModal')).show();
    }

    function confirmReject() {
      const reason = document.getElementById('rejectReason').value.trim();
      if (!reason) {
        Utils.showToast('Please provide a rejection reason', 'error');
        return;
      }

      const session = Auth.getSession();
      const result = App.rejectBill(currentBillId, session.user_id, reason);

      if (result.success) {
        Utils.showToast(result.message, 'success');
        bootstrap.Modal.getInstance(document.getElementById('rejectModal')).hide();
        loadBillsTable();
        updatePendingCount();
      } else {
        Utils.showToast(result.message, 'error');
      }
    }

    // --- Invoice Preview ---
    function previewInvoice(billId) {
      const bill = App.getById('bills', billId);
      if (!bill || bill.status !== 'approved') {
        Utils.showToast('Invoice available only for approved bills', 'warning');
        return;
      }
      // Convert bill to order-like object for Invoice module
      const orderLike = billToOrder(bill);
      Invoice.openPrintPreview(orderLike.id);
    }

    function printInvoice(billId) {
      const bill = App.getById('bills', billId);
      if (!bill || bill.status !== 'approved') return;
      const orderLike = billToOrder(bill);
      Invoice.openPrintPreview(orderLike.id);
    }

    // Convert bill format to legacy order format for Invoice module
    function billToOrder(bill) {
      // Check if already saved as order
      let order = App.getById('orders', `bill_${bill.id}`);
      if (!order) {
        // Create a virtual order for invoice generation
        order = {
          id: `bill_${bill.id}`,
          order_number: bill.bill_number,
          invoice_number: Utils.generateNumber('SL'),
          customer_name: bill.customer_name,
          customer_email: bill.customer_email,
          customer_phone: bill.customer_phone,
          items: bill.items.map(item => ({
            product_id: item.product_id,
            name: item.name,
            price: item.mrp,
            quantity: item.quantity,
            batch_number: item.batch_number,
            expiry_date: item.expiry_date,
            gst_rate: item.gst_rate,
            base_price: item.base_price,
            gst_amount: item.gst_amount
          })),
          subtotal: bill.subtotal,
          tax: bill.total_gst,
          delivery_charge: bill.delivery_charge,
          total: bill.grand_total,
          status: 'confirmed',
          payment_method: bill.payment_method,
          address: bill.address,
          notes: bill.notes,
          created_at: bill.created_at,
          confirmed_at: bill.approved_at
        };
        App.add('orders', order);
      }
      return order;
    }
  </script>
</body>
</html>
