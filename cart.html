<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Review your shopping cart and proceed to checkout at SHOBHA MEDICAL STORES.">
  <title>Shopping Cart — SHOBHA MEDICAL STORES</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
  <link href="style.css" rel="stylesheet">
</head>
<body>
  <div class="page-loader" id="pageLoader"><div class="loader-spinner"></div></div>
  <div id="navbar-container"></div>

  <section style="padding-top:100px;padding-bottom:1rem;background:white;border-bottom:var(--border-light);">
    <div class="container">
      <nav aria-label="breadcrumb">
        <ol class="breadcrumb mb-0" style="font-size:var(--fs-sm);">
          <li class="breadcrumb-item"><a href="index.html">Home</a></li>
          <li class="breadcrumb-item active">Shopping Cart</li>
        </ol>
      </nav>
    </div>
  </section>

  <section class="section-padding" style="padding-top:2rem;">
    <div class="container">
      <h2 class="mb-4"><i class="fas fa-shopping-cart me-2 text-gradient"></i>Shopping Cart</h2>
      
      <div class="row" id="cartContent">
        <!-- Loaded dynamically -->
      </div>
    </div>
  </section>

  <div id="footer-container"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/seed-data.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/app.js"></script>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      App.init();
      document.getElementById('navbar-container').innerHTML = App.getNavbarHTML('cart');
      document.getElementById('footer-container').innerHTML = App.getFooterHTML();
      renderCart();
    });

    function renderCart() {
      const cartData = App.getCartDetails();
      const container = document.getElementById('cartContent');

      if (cartData.items.length === 0) {
        container.innerHTML = `
          <div class="col-12">
            <div class="empty-state">
              <i class="fas fa-shopping-cart"></i>
              <h4>Your cart is empty</h4>
              <p>Looks like you haven't added any products yet. Browse our catalog and add items to your cart.</p>
              <a href="products.html" class="btn-primary-custom">
                <i class="fas fa-pills me-1"></i> Browse Products
              </a>
            </div>
          </div>`;
        return;
      }

      let itemsHTML = cartData.items.map(item => {
        const icon = Utils.getCategoryIcon(item.product.category);
        return `
          <div class="cart-item fade-in" id="cartItem-${item.product_id}">
            <div class="item-img">
              <i class="fas ${icon}"></i>
            </div>
            <div class="item-info">
              <div class="item-name">
                <a href="product-detail.html?id=${item.product_id}" class="text-decoration-none text-dark">${Utils.sanitize(item.product.name)}</a>
              </div>
              <div class="item-category">${Utils.sanitize(item.product.category)}</div>
              ${item.product.dosage ? `<small class="text-muted">${Utils.sanitize(item.product.dosage)}</small>` : ''}
            </div>
            <div class="d-flex align-items-center gap-3 flex-wrap">
              <div class="quantity-control">
                <button onclick="updateQty('${item.product_id}', ${item.quantity - 1})"><i class="fas fa-minus"></i></button>
                <input type="number" class="qty-value" value="${item.quantity}" readonly>
                <button onclick="updateQty('${item.product_id}', ${item.quantity + 1})"><i class="fas fa-plus"></i></button>
              </div>
              <div class="item-price">${Utils.formatCurrency(item.subtotal)}</div>
              <button class="btn btn-sm text-danger border-0" onclick="removeItem('${item.product_id}')" title="Remove">
                <i class="fas fa-trash-alt"></i>
              </button>
            </div>
          </div>
        `;
      }).join('');

      container.innerHTML = `
        <div class="col-lg-8">
          <div class="d-flex align-items-center justify-content-between mb-3">
            <span class="text-muted">${cartData.itemCount} item${cartData.itemCount !== 1 ? 's' : ''} in cart</span>
            <button class="btn btn-sm text-danger" onclick="clearCartConfirm()">
              <i class="fas fa-trash me-1"></i> Clear Cart
            </button>
          </div>
          ${itemsHTML}
        </div>
        <div class="col-lg-4">
          <div class="cart-summary">
            <h4><i class="fas fa-receipt me-2"></i>Order Summary</h4>
            <div class="summary-row">
              <span>Subtotal (${cartData.itemCount} items)</span>
              <span>${Utils.formatCurrency(cartData.subtotal)}</span>
            </div>
            <div class="summary-row">
              <span>GST (${cartData.taxRate}%)</span>
              <span>${Utils.formatCurrency(cartData.tax)}</span>
            </div>
            <div class="summary-row">
              <span>Delivery Charge</span>
              <span>${cartData.deliveryCharge === 0 ? '<span class="text-success fw-bold">FREE</span>' : Utils.formatCurrency(cartData.deliveryCharge)}</span>
            </div>
            ${cartData.deliveryCharge > 0 ? `
              <div class="alert alert-info py-2 px-3 mt-2" style="font-size:var(--fs-xs);border-radius:var(--radius-md);">
                <i class="fas fa-info-circle me-1"></i>Add ${Utils.formatCurrency(cartData.freeDeliveryAbove - cartData.subtotal)} more for free delivery!
              </div>
            ` : ''}
            <div class="summary-total">
              <span>Total</span>
              <span class="text-gradient">${Utils.formatCurrency(cartData.total)}</span>
            </div>
            <div class="mt-4 d-grid gap-2">
              <a href="checkout.html" class="btn-primary-custom btn-lg-custom text-center">
                <i class="fas fa-shield-alt me-1"></i> Proceed to Checkout
              </a>
              <a href="products.html" class="btn-outline-custom text-center" style="font-size:var(--fs-sm);">
                <i class="fas fa-arrow-left me-1"></i> Continue Shopping
              </a>
            </div>
          </div>
        </div>
      `;
    }

    function updateQty(productId, newQty) {
      if (newQty <= 0) {
        removeItem(productId);
        return;
      }
      App.updateCartQuantity(productId, newQty);
      renderCart();
    }

    function removeItem(productId) {
      App.removeFromCart(productId);
      renderCart();
    }

    function clearCartConfirm() {
      if (confirm('Remove all items from cart?')) {
        App.clearCart();
        renderCart();
        Utils.showToast('Cart cleared', 'success');
      }
    }
  </script>
</body>
</html>
